<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hermes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600;6..72,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />

</head>
<body>
  <div id="root"></div>

  <script>
    window.addEventListener("error", event => {
      const root = document.getElementById("root");
      if (!root || root.childElementCount) return;
      root.innerHTML = `<pre style="padding:24px;font:14px/1.5 monospace;color:#8a1f11;background:#fff4f0;white-space:pre-wrap">JavaScript error:\n${event.message}\n${event.filename || ""}:${event.lineno || ""}:${event.colno || ""}</pre>`;
    });

    window.addEventListener("unhandledrejection", event => {
      const root = document.getElementById("root");
      if (!root || root.childElementCount) return;
      const reason = event.reason?.stack || event.reason?.message || String(event.reason);
      root.innerHTML = `<pre style="padding:24px;font:14px/1.5 monospace;color:#8a1f11;background:#fff4f0;white-space:pre-wrap">Promise error:\n${reason}</pre>`;
    });
  </script>

  <!-- React + Babel -->
