name: Update sports data & send newsletter

on:
  workflow_dispatch:
  schedule:
    - cron: "20 8 * * *"   # 08:20 UTC daily

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── NHL Tracker data ────────────────────────────────────────────────────
      - name: Update NHL tracker data (data.js)
        run: python3 scripts/update_data.py

      # ── Sports newsletter data ──────────────────────────────────────────────
      - name: Update sports newsletter data (sports-data.js)
        run: python3 scripts/update_sports_data.py

      # ── Commit both files if changed ────────────────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js sports-data.js
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update sports data $(date '+%Y-%m-%d')"
            git push
          fi

      # ── Send newsletter email ───────────────────────────────────────────────
      # Skips silently if send_newsletter secret is not configured
      - name: Send newsletter email
        env:
          GMAIL_USER: carlosrealmurcia@gmail.com
          GMAIL_APP_PASSWORD: ${{ secrets.send_newsletter }}
          NEWSLETTER_RECIPIENTS: carlosrealmurcia@gmail.com
        run: python3 scripts/send_newsletter.py
