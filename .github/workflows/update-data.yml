name: Update sports data & send newsletter

on:
  workflow_dispatch:
  schedule:
    # Paired CET/CEST slots. Every scheduled run updates data; GitHub can delay
    # cron jobs, so we intentionally avoid exact local-time filtering.
    - cron: "20 5 * * *"
    - cron: "20 6 * * *"
    - cron: "41 12 * * *"
    - cron: "41 13 * * *"
    - cron: "20 20 * * *"
    - cron: "20 21 * * *"

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── All Hermes sport data ───────────────────────────────────────────────
      # continue-on-error: a single flaky feed (ESPN 403/429 from GitHub's IPs,
      # an offline source, etc.) must NOT block publishing the sports that did
      # regenerate. Each update script writes its file only on success, so a
      # failed sport simply keeps its previous data and never gets committed.
      - name: Update all sport data
        continue-on-error: true
        run: python3 scripts/update_all_data.py

      # Tennis is time-sensitive during Slams. Run it strictly after the broad
      # update so stale cache/network failures are visible and do not publish.
      - name: Update tennis data strictly
        continue-on-error: true
        run: python3 scripts/update_tennis_data.py

      - name: Check data freshness
        continue-on-error: true
        run: python3 scripts/check_data_freshness.py

      # ── Commit both files if changed ────────────────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js *_data.js
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update sports data $(date '+%Y-%m-%d')"
            git push
          fi

      # Newsletter email disabled by request (2026-06-20): the site still updates
      # and deploys 6×/day; no email is sent. To re-enable, restore a "Send
      # newsletter email" step running scripts/send_newsletter.py with the
      # GMAIL_APP_PASSWORD secret (and ideally gate it to a single daily slot).
